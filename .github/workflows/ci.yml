name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (vue-tsc + eslint)
        run: npm run lint

      - name: Tests (incl. golden-save lineage)
        run: npm test

      - name: Build
        run: npm run build

      # Belt-and-braces: CI builds unflagged (no VITE_DAO_DEBUG), so the debug
      # production accelerator (window.__daoDebug, src/debug.ts) must be fully
      # dead-code-eliminated from dist/. Fail if the symbol survives — proof the
      # gating holds on every push, not just at release time.
      - name: Assert no debug symbol in build
        run: |
          set -euo pipefail
          if grep -rq '__daoDebug' dist/; then
            echo "::error::Debug symbol __daoDebug found in dist/ — it must be dead-code-eliminated from unflagged builds."
            grep -rl '__daoDebug' dist/ || true
            exit 1
          fi
          echo "OK: no __daoDebug symbol in dist/."

      # The pacing sim prints PASS/FAIL lines (incl. the Gate-D pinned bands)
      # but always exits 0 — enforce the FAIL lines here. 2>&1 matters: the
      # Act I pinned-band FAILs go to console.error, and a stdout-only tee was
      # stderr-blind — those bands were never actually CI-fatal until this fix
      # (step-8 Finding A, signed off 2026-07-05).
      - name: Pacing sim (pinned bands)
        run: |
          npm run sim 2>&1 | tee sim-output.log
          if grep -q "FAIL" sim-output.log; then
            echo "::error::Pacing sim reported FAIL lines (see log above)"
            exit 1
          fi
