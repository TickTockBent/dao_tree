name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Stage only the files the game loads at runtime. Everything else in the
      # repo (docs/, Old Things/, js/Demo/, Node build tooling, *.md, source
      # images) is deliberately excluded so a future private repo doesn't leak.
      - name: Stage minimal game files
        run: |
          set -euo pipefail
          mkdir -p _site/js/data _site/js/technical _site/js/utils _site/js/build
          # Entry point + root image assets referenced by index.html
          cp index.html options_wheel.png discord.png _site/
          # Stylesheets and runtime image assets (particle sprites)
          cp -r css resources _site/
          # Root JS modules: mod, game, utils, components, and the dynamically
          # loaded modFiles (layers.js, tree.js)
          cp js/*.js _site/js/
          # Runtime JS subtrees (all .js; READMEs and fixtures left behind)
          cp js/data/*.js _site/js/data/
          cp js/technical/*.js _site/js/technical/
          cp js/utils/*.js _site/js/utils/
          # From js/build, only the three modules loaded by index.html at runtime;
          # the rest (check-all, lint-node, pacing-sim, *-node.js) is Node tooling.
          cp js/build/linter.js js/build/layerFactory.js js/build/hintEngine.js _site/js/build/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
