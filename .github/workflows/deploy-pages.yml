name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build site
        # VITE_DAO_DEBUG activates the debug throttle hook (src/debug.ts) in THIS
        # build only — ci.yml and release-itch.yml never set it, and both carry a
        # grep guard that FAILS if the __daoDebug symbol ever reaches their bundles.
        env:
          VITE_DAO_DEBUG: 1
        run: ./scripts/build-site.sh _site

      # Pages tracks the bleeding edge, so warn players this is the experimental build
      # and point them at the stable itch.io release. Injected into the staged _site copy
      # ONLY here (the itch release workflow never runs this step), after the build guard.
      - name: Inject experimental-branch banner (Pages only)
        run: |
          node -e "const fs=require('fs');const banner=fs.readFileSync('.github/pages-banner.html','utf8');const page=fs.readFileSync('_site/index.html','utf8');if(!page.includes('</body>')){console.error('::error::missing </body> in staged index.html');process.exit(1);}fs.writeFileSync('_site/index.html',page.replace('</body>',banner+'</body>'));console.log('Injected experimental-branch banner into _site/index.html');"

      # Debug helper (Pages ONLY): keys 1-5 multiply Qi production by 10^(n-1). Like the banner,
      # injected only here — the itch release workflow never runs this, and build-site.sh never
      # stages .github/, so debug keys cannot reach the stable build or a future private runtime.
      - name: Inject debug keys (Pages only)
        run: |
          node -e "const fs=require('fs');const debug=fs.readFileSync('.github/pages-debug.html','utf8');const page=fs.readFileSync('_site/index.html','utf8');if(!page.includes('</body>')){console.error('::error::missing </body> in staged index.html');process.exit(1);}fs.writeFileSync('_site/index.html',page.replace('</body>',debug+'</body>'));console.log('Injected debug keys into _site/index.html');"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
