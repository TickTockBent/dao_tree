name: Release to itch.io

# GitHub Pages tracks bleeding edge (every push to main). This workflow only
# fires when you cut a release tag like `itch-1.2.3`, publishing the same scoped
# build to itch.io via butler. Manual runs are allowed for re-pushes.
on:
  push:
    tags:
      - 'itch-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label shown on itch.io (e.g. 1.2.3)'
        required: true

# Configure once in repo settings:
#   - Secret  BUTLER_API_KEY  -> an itch.io API key (itch.io > Settings > API keys)
#   - Variable ITCH_TARGET    -> "user/game-slug" (e.g. ticktockbent/cultivation-prestige)
# The html5 channel is served in-browser once "play in browser" is enabled for
# that upload on the itch.io game page.
jobs:
  butler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: ./scripts/build-site.sh _site

      # Belt-and-braces: the debug production accelerator (window.__daoDebug,
      # src/debug.ts) is gated behind VITE_DAO_DEBUG, which this workflow never
      # sets — so the built bundle must NOT contain the debug symbol. Fail the
      # release if it does, rather than trusting that the flag stayed unset.
      - name: Assert no debug symbol in release build
        run: |
          set -euo pipefail
          if grep -rq '__daoDebug' _site/; then
            echo "::error::Debug symbol __daoDebug found in release build (_site/) — VITE_DAO_DEBUG must never be set for itch releases."
            grep -rl '__daoDebug' _site/ || true
            exit 1
          fi
          echo "OK: no __daoDebug symbol in _site/."

      - name: Resolve version label
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            label="${{ github.event.inputs.version }}"
          else
            # refs/tags/itch-1.2.3 -> 1.2.3
            label="${GITHUB_REF_NAME#itch-}"
          fi
          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${label}"

      - name: Install butler
        run: |
          set -euo pipefail
          curl -sL -o butler.zip "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ vars.ITCH_TARGET }}
        run: |
          set -euo pipefail
          if [ -z "${BUTLER_API_KEY:-}" ]; then
            echo "::error::Secret BUTLER_API_KEY is not set."; exit 1
          fi
          if [ -z "${ITCH_TARGET:-}" ]; then
            echo "::error::Variable ITCH_TARGET is not set (expected user/game-slug)."; exit 1
          fi
          ./butler push _site "${ITCH_TARGET}:html5" --userversion "${{ steps.version.outputs.label }}"
