<!-- pages-debug.html — DEBUG-ONLY helper injected into the GitHub Pages build (see the
     "Inject debug keys (Pages only)" step in .github/workflows/deploy-pages.yml). It is
     NEVER staged by scripts/build-site.sh and NEVER injected by the itch release workflow,
     so it cannot reach the stable itch.io build or a future private runtime.

     Keys 1-5 set production to 10^(n-1): 1 = x1 (normal), 2 = x10, 3 = x100, 4 = x1000,
     5 = x10000. The multiplier is applied to Qi (getPointGen), sect Contribution
     (contributionPerSecond), and Dao Insight (insightPerSecond) — the three per-second
     pipelines — by wrapping each global at runtime, so there is ZERO debug footprint in the
     shipped game source. -->
<style>
  #dao-debug-badge {
    position: fixed; top: 6px; left: 6px; z-index: 2147483646;
    font-family: Inconsolata, monospace; font-size: 12px;
    background: rgba(20,20,30,0.78); color: #9fe0a0;
    border: 1px solid #3a8a4a; border-radius: 3px; padding: 2px 7px;
    pointer-events: none; opacity: 0.55;
  }
</style>
<div id="dao-debug-badge">Debug: keys 1-5 (&times;1)</div>
<script>
(function () {
  // 10^debugExponent is the production multiplier. Key n sets it to 10^(n-1).
  var debugExponent = 0;
  function multiplierLabel() { return "×" + Math.pow(10, debugExponent); }
  function refreshBadge() {
    var badge = document.getElementById("dao-debug-badge");
    if (!badge) return;
    badge.textContent = "Debug: keys 1-5 (" + multiplierLabel() + ")";
    badge.style.opacity = debugExponent === 0 ? "0.55" : "1";
    badge.style.color = debugExponent === 0 ? "#9fe0a0" : "#ffd24d";
  }
  // Wrap one global per-second function so its result is multiplied by the debug factor.
  // Each is read live each tick by the engine / layer update()s, so the wrap takes effect at once.
  function wrapPerSecond(globalName) {
    var original = window[globalName];
    window[globalName] = function () {
      var base = original.apply(this, arguments);
      if (debugExponent === 0) return base;
      return base.times(Decimal.pow(10, debugExponent));
    };
  }
  // Install once all three pipelines (and Decimal) are defined — they load with the engine.
  function installHook() {
    if (typeof Decimal === "undefined"
        || typeof window.getPointGen !== "function"
        || typeof window.contributionPerSecond !== "function"
        || typeof window.insightPerSecond !== "function") {
      setTimeout(installHook, 200);
      return;
    }
    if (window.__daoDebugHooked) return;
    window.__daoDebugHooked = true;
    wrapPerSecond("getPointGen");          // Qi production
    wrapPerSecond("contributionPerSecond"); // sect Contribution
    wrapPerSecond("insightPerSecond");      // Dao Insight
    console.log("[dao-debug] debug keys ready (1-5 scale Qi / Contribution / Insight by x1..x10000)");
  }
  installHook();
  window.addEventListener("keydown", function (keyEvent) {
    var targetTag = keyEvent.target && keyEvent.target.tagName;
    if (targetTag === "INPUT" || targetTag === "TEXTAREA" || targetTag === "SELECT") return;
    if (keyEvent.ctrlKey || keyEvent.metaKey || keyEvent.altKey) return;
    var pressedDigit = parseInt(keyEvent.key, 10);
    if (pressedDigit >= 1 && pressedDigit <= 5) {
      debugExponent = pressedDigit - 1;
      refreshBadge();
      console.log("[dao-debug] production " + multiplierLabel() + " (Qi / Contribution / Insight)");
    }
  });
})();
</script>
